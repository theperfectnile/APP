<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vaultwise Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
  }
  header {
    background: #161b22;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #30363d;
  }
  .logo {
    font-size: 22px;
    font-weight: bold;
    color: #58a6ff;
  }
  .plan-badge {
    padding: 6px 12px;
    border-radius: 20px;
    background: #30363d;
    font-size: 13px;
  }
  .plan-badge.pro {
    background: #238636;
  }
  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #238636;
    color: white;
    margin-top: 10px;
  }
  .btn.secondary {
    background: #8250df;
  }
  .btn.danger {
    background: #f85149;
  }
  .section {
    padding: 24px;
    border-bottom: 1px solid #30363d;
  }
  h2 {
    margin-top: 0;
    color: #58a6ff;
  }
  input, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    margin-bottom: 12px;
  }
  .card {
    background: #161b22;
    padding: 16px;
    border-radius: 10px;
    margin-top: 12px;
    border: 1px solid #30363d;
  }
  .modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
  }
  .modal-content {
    background: #161b22;
    padding: 24px;
    border-radius: 12px;
    width: 90%;
    max-width: 420px;
    border: 1px solid #30363d;
  }
</style>
</head>

<body>

<header>
  <div class="logo">Vaultwise</div>
  <div>
    <span id="planBadge" class="plan-badge">Free plan</span>
    <button class="btn danger" onclick="logout()">Log out</button>
  </div>
</header>

<!-- Budget Section -->
<div class="section">
  <h2>Budget Analyzer</h2>
  <input id="income" type="number" placeholder="Monthly income">
  <div id="expenses"></div>
  <button class="btn secondary" onclick="addExpense()">Add Expense</button>
  <button class="btn" onclick="analyzeBudget()">Analyze Budget</button>

  <div id="budgetResults"></div>
</div>

<!-- Portfolio Section -->
<div class="section">
  <h2>
    Portfolio Analyzer
    <span id="proLockPill" style="font-size:12px; padding:4px 8px; border:1px solid #30363d; border-radius:6px; margin-left:8px;">
      Locked
    </span>
  </h2>

  <div id="portfolioSection" style="display:none;">
    <div id="portfolio"></div>
    <button class="btn secondary" onclick="addAsset()">Add Asset</button>
    <button class="btn" onclick="analyzePortfolio()">Analyze Portfolio</button>
    <div id="portfolioResults"></div>
  </div>

  <button class="btn" onclick="openPortfolio()">Open Portfolio Analyzer</button>
</div>

<!-- Trial Modal -->
<div id="upgradeModal" class="modal">
  <div class="modal-content">
    <h2>Unlock Portfolio Analyzer</h2>
    <p>Start your <strong>7‑day free trial</strong> of Vaultwise Pro.</p>
    <p>No charge during the trial.</p>

    <button class="btn secondary" onclick="startTrial()">Start 7‑day Trial</button>
    <button class="btn danger" onclick="closeUpgradeModal()">Cancel</button>
  </div>
</div>

<script>
const API_BASE = "https://portfolio-god-99rv.onrender.com";
let token = sessionStorage.getItem("vaultwise_token");
let currentPlan = "free";

/* ---------- AUTH ---------- */

function requireAuth() {
  if (!token) {
    window.location.href = "login.html";
  }
}

function logout() {
  sessionStorage.removeItem("vaultwise_token");
  window.location.href = "login.html";
}

/* ---------- PROFILE ---------- */

async function loadProfile() {
  try {
    const res = await fetch(`${API_BASE}/api/profile`, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();
    if (!res.ok) return logout();

    currentPlan = data.plan;

    const badge = document.getElementById("planBadge");
    const pill = document.getElementById("proLockPill");
    const portfolioSection = document.getElementById("portfolioSection");

    if (data.plan === "pro") {
      badge.textContent = "Pro plan";
      badge.classList.add("pro");
      pill.textContent = "Unlocked";
      pill.style.borderColor = "#238636";
      portfolioSection.style.display = "block";
    } else if (data.plan === "trial") {
      badge.textContent = "Trial (7 days)";
      badge.classList.add("pro");
      pill.textContent = "Unlocked (Trial)";
      pill.style.borderColor = "#f2cc60";
      portfolioSection.style.display = "block";
    } else {
      badge.textContent = "Free plan";
      badge.classList.remove("pro");
      pill.textContent = "Locked";
      pill.style.borderColor = "#30363d";
      portfolioSection.style.display = "none";
    }

  } catch {
    logout();
  }
}

/* ---------- TRIAL MODAL ---------- */

function openUpgradeModal() {
  document.getElementById("upgradeModal").style.display = "flex";
}

function closeUpgradeModal() {
  document.getElementById("upgradeModal").style.display = "none";
}

function openPortfolio() {
  if (currentPlan === "free") {
    openUpgradeModal();
    return;
  }
  document.getElementById("portfolioSection").scrollIntoView({ behavior: "smooth" });
}

async function startTrial() {
  const res = await fetch(`${API_BASE}/api/start-trial`, {
    method: "POST",
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();
  if (!res.ok) {
    alert(data.error || "Could not start trial.");
    return;
  }

  token = data.token;
  sessionStorage.setItem("vaultwise_token", token);

  closeUpgradeModal();
  await loadProfile();
  alert("Your 7‑day trial has started!");
}

/* ---------- BUDGET ---------- */

function addExpense() {
  const container = document.getElementById("expenses");
  const div = document.createElement("div");
  div.innerHTML = `
    <input type="text" placeholder="Category">
    <input type="number" placeholder="Amount">
  `;
  container.appendChild(div);
}

async function analyzeBudget() {
  const income = Number(document.getElementById("income").value);
  const expenseInputs = document.querySelectorAll("#expenses div");

  const expenses = [];
  expenseInputs.forEach(div => {
    const [cat, amt] = div.querySelectorAll("input");
    if (cat.value && amt.value) {
      expenses.push({ category: cat.value, amount: Number(amt.value) });
    }
  });

  const res = await fetch(`${API_BASE}/api/budget`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ income, expenses })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.error);

  const out = document.getElementById("budgetResults");
  out.innerHTML = `
    <div class="card"><strong>Total Expenses:</strong> $${data.totalExpenses}</div>
    <div class="card"><strong>Savings:</strong> $${data.savings}</div>
    <div class="card"><strong>Savings Rate:</strong> ${data.savingsRate}%</div>
    <h3>Insights</h3>
    ${data.insights.map(i => `<div class="card">${i}</div>`).join("")}
  `;
}

/* ---------- PORTFOLIO ---------- */

function addAsset() {
  const container = document.getElementById("portfolio");
  const div = document.createElement("div");
  div.innerHTML = `
    <input type="text" placeholder="Asset name">
    <input type="number" placeholder="Value">
    <input type="text" placeholder="Sector">
    <input type="text" placeholder="Region">
  `;
  container.appendChild(div);
}

async function analyzePortfolio() {
  const assetDivs = document.querySelectorAll("#portfolio div");
  const portfolio = [];

  assetDivs.forEach(div => {
    const [name, value, sector, region] = div.querySelectorAll("input");
    if (name.value && value.value) {
      portfolio.push({
        name: name.value,
        value: Number(value.value),
        sector: sector.value || "Unknown",
        region: region.value || "Unknown"
      });
    }
  });

  const res = await fetch(`${API_BASE}/api/analyze`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ portfolio })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.error);

  const out = document.getElementById("portfolioResults");
  out.innerHTML = `
    <div class="card"><strong>Total Value:</strong> $${data.totalValue}</div>
    <h3>Sectors</h3>
    ${data.sectors.map(s => `<div class="card">${s.sector}: ${s.percent}%</div>`).join("")}
    <h3>Regions</h3>
    ${data.regions.map(r => `<div class="card">${r.region}: ${r.percent}%</div>`).join("")}
    <h3>Insights</h3>
    ${data.insights.map(i => `<div class="card">${i}</div>`).join("")}
  `;
}

/* ---------- INIT ---------- */

requireAuth();
loadProfile();
</script>

</body>
</html>
