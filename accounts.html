<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Accounts</title>
  <link rel="stylesheet" href="styles.css?v=10" />
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="insights.html">Insights</a>
      <a href="accounts.html" class="active">Accounts</a>
      <a href="settings.html">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <!-- Warm lifestyle header image -->
    <section class="panel">
      <img
        src="accounts-hero.jpg"
        alt="Black person or family managing accounts"
        style="width:100%;border-radius:12px;object-fit:cover;max-height:260px;"
      />
    </section>

    <header class="page-header">
      <h1>Accounts</h1>
      <span>Manage your linked financial accounts</span>
    </header>

    <!-- Account Cards -->
    <section class="stats-grid">
      <div class="stat-card">
        <h3>Checking Account</h3>
        <p>$4,200</p>
      </div>

      <div class="stat-card">
        <h3>Savings Account</h3>
        <p>$12,800</p>
      </div>

      <div class="stat-card">
        <h3>Brokerage</h3>
        <p>$9,450</p>
      </div>

      <div class="stat-card">
        <h3>Crypto Wallet</h3>
        <p>$1,900</p>
      </div>
    </section>

    <!-- Optional small illustration strip -->
    <section class="panel">
      <h2>Connected Institutions</h2>
      <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;">
        <img src="accounts-illustration.jpg"
             alt="Black-themed illustration of financial institutions"
             style="width:140px;border-radius:12px;object-fit:cover;" />
      </div>
    </section>

    <!-- Add Account -->
    <section class="panel">
      <h2>Link New Account</h2>
      <button class="btn-primary" onclick="showToast('Feature coming soon!', 'info')">+ Add Account</button>
    </section>

  </main>

  <script src="dashboard.js"></script>
  <script>
  const path = window.location.pathname;
  document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
    if (path.includes(item.getAttribute('href'))) {
      item.classList.add('active');
    }
  });
</script>
</body>
</html>
