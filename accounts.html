<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Accounts</title>
  <link rel="stylesheet" href="styles.css?v=10" />
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="/APP/dashboard.html">Dashboard</a>
      <a href="/APP/insights.html">Insights</a>
      <a href="/APP/accounts.html" class="active">Accounts</a>
      <a href="/APP/settings.html">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">
<section class="panel">
  <h2>Account Logos</h2>
  <div style="display:flex;gap:20px;flex-wrap:wrap;">
    <img src="https://logo.clearbit.com/chase.com" width="80" />
    <img src="https://logo.clearbit.com/bankofamerica.com" width="80" />
    <img src="https://logo.clearbit.com/coinbase.com" width="80" />
    <img src="https://logo.clearbit.com/robinhood.com" width="80" />
  </div>
</section>
    <header class="page-header">
      <h1>Accounts</h1>
      <span>Manage your linked financial accounts</span>
    </header>

    <!-- Account Cards -->
    <section class="stats-grid">
      <div class="stat-card">
        <h3>Checking Account</h3>
        <p>$4,200</p>
      </div>

      <div class="stat-card">
        <h3>Savings Account</h3>
        <p>$12,800</p>
      </div>

      <div class="stat-card">
        <h3>Brokerage</h3>
        <p>$9,450</p>
      </div>

      <div class="stat-card">
        <h3>Crypto Wallet</h3>
        <p>$1,900</p>
      </div>
    </section>

    <!-- Add Account -->
    <section class="panel">
      <h2>Link New Account</h2>
      <button class="btn-primary" onclick="showToast('Feature coming soon!', 'info')">+ Add Account</button>
    </section>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
