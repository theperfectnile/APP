<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – Vaultwise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #020617;
      --accent: #4f46e5;
      --accent-2: #22c55e;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --border: rgba(148, 163, 184, 0.35);
      --radius-lg: 22px;
      --radius-md: 12px;
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.75);
      --font: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at 0% 0%, #1d283a 0, transparent 55%),
        radial-gradient(circle at 100% 0%, #4f46e5 0, transparent 55%),
        radial-gradient(circle at 0% 100%, #0f766e 0, transparent 55%),
        radial-gradient(circle at 100% 100%, #020617 0, #000 55%);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(50px);
      opacity: 0.45;
      mix-blend-mode: screen;
      pointer-events: none;
      animation: float 18s ease-in-out infinite alternate;
      z-index: 0;
    }
    .orb--1 { width: 420px; height: 420px; background: #6366f1; top: -80px; right: -40px; }
    .orb--2 { width: 360px; height: 360px; background: #22c55e; bottom: -120px; left: -40px; animation-delay: -8s; }
    .orb--3 { width: 260px; height: 260px; background: #ec4899; top: 40%; left: 55%; animation-delay: -13s; }

    @keyframes float {
      0% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(20px,-30px,0) scale(1.05); }
      100% { transform: translate3d(-30px,20px,0) scale(0.98); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      animation: fadeIn 0.7s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 0, #a5b4fc, #4f46e5 60%, #1d1b4b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      margin-bottom: 12px;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.7);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
      font-weight: 600;
    }

    .subtitle {
      margin: 0 0 20px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    .btn-primary {
      width: 100%;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(79, 70, 229, 0.6);
      transition: 0.15s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 55px rgba(79, 70, 229, 0.8);
    }

    .footer {
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <div class="orb orb--3"></div>

  <div class="card">
    <div class="logo">V</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to access your dashboard.</p>

    <form id="loginForm">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" required />

      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" required />

      <button class="btn-primary" type="submit">Log In</button>
    </form>

    <div class="footer">
      Don’t have an account?
      <a href="register.html">Create one</a>
    </div>
  </div>

  <script>
    const API = "https://portfolio-god.onrender.com/api";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      try {
        const res = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        localStorage.setItem("vaultwiseEmail", data.email);
        window.location.href = "dashboard.html";

      } catch (err) {
        alert("Login failed. Check your backend or internet connection.");
      }
    });
  </script>
</body>
</html>
