<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – Vaultwise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-box {
        background: #161b22;
        padding: 30px;
        border-radius: 10px;
        width: 320px;
        border: 1px solid #30363d;
    }

    h2 {
        margin-top: 0;
        text-align: center;
        color: #58a6ff;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #e6edf3;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #238636;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #2ea043;
    }

    .error {
        color: #f85149;
        margin-top: 10px;
        text-align: center;
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="errorBox" class="error"></div>
</div>

<script>
const API_BASE = "https://portfolio-god-99rv.onrender.com";
const API_KEY = "my-super-secret-key-123";

async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorBox = document.getElementById("errorBox");

    errorBox.textContent = "";

    if (!email || !password) {
        errorBox.textContent = "Please enter email and password.";
        return;
    }

    try {
        const res = await fetch(API_BASE + "/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": API_KEY
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!data.token) {
            errorBox.textContent = data.error || "Login failed.";
            return;
        }

        // SAVE TOKEN CORRECTLY
        localStorage.setItem("token", data.token);

        // REDIRECT TO DASHBOARD
        window.location.href = "dashboard.html";

    } catch (err) {
        errorBox.textContent = "Network error. Try again.";
    }
}
</script>

</body>
</html>
