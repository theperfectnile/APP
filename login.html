<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – Vaultwise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-circle">V</div>
        <h1>Vaultwise</h1>
        <p class="auth-subtitle">Secure insights for your money and investments.</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" required placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" required placeholder="••••••••" />
        </div>

        <div class="form-footer">
          <a href="forgot-password.html" class="link-sm">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Log in
        </button>
      </form>

      <p class="auth-switch">
        Don’t have an account?
        <a href="register.html">Create one</a>
      </p>
    </div>

    <div class="auth-side">
      <h2>See your entire financial life in one place.</h2>
      <ul class="auth-bullets">
        <li>Track spending with Budget Analyzer</li>
        <li>Understand risk with Portfolio Analyzer</li>
        <li>Unlock patterns with AI Insights</li>
      </ul>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
