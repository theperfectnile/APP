<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Insights</title>
  <link rel="stylesheet" href="styles.css?v=10" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="insights.html" class="active">Insights</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <!-- Header -->
    <header class="page-header">
      <h1>Insights</h1>
      <span>AI‑powered financial analysis</span>
    </header>

    <!-- Small lifestyle + illustration panel -->
    <section class="panel">
      <h2>Your Financial Story</h2>
      <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
        <img
          src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=800&q=80"
          alt="Black man reviewing monthly budget"
          style="flex:1;min-width:220px;border-radius:12px;object-fit:cover;max-height:220px;"
        />
        <img
          src="https://images.unsplash.com/photo-1520607162513-62b27008f2c5?auto=format&fit=crop&w=800&q=80"
          alt="Black woman planning savings goals"
          style="flex:1;min-width:220px;border-radius:12px;object-fit:cover;max-height:220px;"
        />
      </div>
    </section>

    <!-- Insight Cards -->
    <section class="stats-grid">
      <div class="stat-card">
        <h3>Spending Trend</h3>
        <p id="trendValue">+4.2%</p>
      </div>

      <div class="stat-card">
        <h3>Income Stability</h3>
        <p id="stabilityValue">Stable</p>
      </div>

      <div class="stat-card">
        <h3>Goal Progress</h3>
        <p id="goalValue">62%</p>
      </div>

      <div class="stat-card">
        <h3>Portfolio Growth</h3>
        <p id="growthValue">+8.9%</p>
      </div>
    </section>

    <!-- Chart -->
    <section class="panel">
      <h2>Income vs Expenses Trend</h2>
      <canvas id="insightsChart" height="120"></canvas>
    </section>

    <!-- AI Insights -->
    <section class="panel">
      <h2>AI Insights</h2>
      <p id="aiInsightText">Analyzing your financial patterns...</p>
    </section>

  </main>

  <script>
    // AI text animation
    setTimeout(() => {
      const el = document.getElementById("aiInsightText");
      if (el) {
        el.innerText =
          "Your spending increased slightly this month, but income remains stable. Savings are on track to meet your quarterly goal.";
      }
    }, 1200);

    // Chart.js line chart
    const ctx = document.getElementById("insightsChart");
    if (ctx) {
      new Chart(ctx, {
        type: "line",
        data: {
          labels: ["Jan", "Feb", "Mar", "Apr"],
          datasets: [
            {
              label: "Income",
              data: [4200, 4300, 4400, 4500],
              borderColor: "#00eaff",
              backgroundColor: "rgba(0,234,255,0.15)",
              tension: 0.3
            },
            {
              label: "Expenses",
              data: [3100, 3300, 3500, 3600],
              borderColor: "#ff3b3b",
              backgroundColor: "rgba(255,59,59,0.15)",
              tension: 0.3
            }
          ]
        }
      });
    }
  </script>

  <script src="dashboard.js"></script>
</body>
</html>
