<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Insights</title>
  <link rel="stylesheet" href="styles.css?v=10" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="/APP/dashboard.html">Dashboard</a>
      <a href="/APP/insights.html" class="active">Insights</a>
      <a href="/APP/accounts.html">Accounts</a>
      <a href="/APP/settings.html">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <header class="page-header">
      <h1>Insights</h1>
      <span>AI‑powered financial analysis</span>
    </header>

    <!-- Insight Cards -->
    <section class="stats-grid">
      <div class="stat-card">
        <h3>Spending Trend</h3>
        <p id="trendValue">+4.2%</p>
      </div>

      <div class="stat-card">
        <h3>Income Stability</h3>
        <p id="stabilityValue">Stable</p>
      </div>

      <div class="stat-card">
        <h3>Goal Progress</h3>
        <p id="goalValue">62%</p>
      </div>

      <div class="stat-card">
        <h3>Portfolio Growth</h3>
        <p id="growthValue">+8.9%</p>
      </div>
    </section>

    <!-- Chart -->
    <section class="panel">
      <h2>Income vs Expenses Trend</h2>
      <canvas id="insightsChart" height="120"></canvas>
    </section>

    <!-- AI Insights -->
    <section class="panel">
      <h2>AI Insights</h2>
      <p id="aiInsightText">Analyzing your financial patterns...</p>
    </section>

  </main>

  <script src="dashboard.js"></script>

  <script>
    // Fake AI text animation
    setTimeout(() => {
      document.getElementById("aiInsightText").innerText =
        "Your spending increased slightly this month, but income remains stable. Savings are on track to meet your quarterly goal.";
    }, 1200);

    // Fake chart
    new Chart(document.getElementById("insightsChart"), {
      type: "line",
      data: {
        labels: ["Jan", "Feb", "Mar", "Apr"],
        datasets: [
          {
            label: "Income",
            data: [4200, 4300, 4400, 4500],
            borderColor: "#00eaff",
            tension: 0.3
          },
          {
            label: "Expenses",
            data: [3100, 3300, 3500, 3600],
            borderColor: "#ff3b3b",
            tension: 0.3
          }
        ]
      }
    });
  </script>

</body>
</html>
