<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Insights</title>
  <link rel="stylesheet" href="styles.css?v=10" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="insights.html" class="active">Insights</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <!-- Header -->
    <header class="page-header">
      <h1>Insights</h1>
      <div class="insights-hero">
    <img src="images/insights-hero-1.jpg" alt="Financial Insights Image 1" class="insights-hero-img">
    <img src="images/insights-hero-2.jpg" alt="Financial Insights Image 2" class="insights-hero-img">
</div>
      <span>AI‑powered financial analysis</span>
    </header>

   

    <!-- AI Insights -->
    <section class="panel">
      <h2>AI Insights</h2>
      <p id="aiInsightText">Analyzing your financial patterns...</p>
    </section>

  </main>

  <script>
    // AI text animation
    setTimeout(() => {
      const el = document.getElementById("aiInsightText");
      if (el) {
        el.innerText =
          "Your spending increased slightly this month, but income remains stable. Savings are on track to meet your quarterly goal.";
      }
    }, 1200);

  </script>

  <script src="dashboard.js"></script>
  <script>
  const path = window.location.pathname;
  document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
    if (path.includes(item.getAttribute('href'))) {
      item.classList.add('active');
    }
  });
</script>
  <script src="premium.js"></script>
</body>
</html>
