<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Settings</title>
  <link rel="stylesheet" href="styles.css?v=10" />
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="insights.html">Insights</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html" class="active">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <header class="page-header">
      <h1>Settings</h1>
      <span>Customize your Vaultwise experience</span>
    </header>

    <!-- GENERAL SETTINGS -->
    <section class="panel">
      <h2>General Settings</h2>

      <div class="form-group">
        <label>Dark Mode</label>
        <button class="btn-secondary" onclick="toggleDarkMode()">Toggle</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Notifications</label>
        <button class="btn-secondary" onclick="showToast('Notifications enabled', 'success')">Enable</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Data Sync</label>
        <button class="btn-secondary" onclick="showToast('Sync complete', 'info')">Sync Now</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Currency Format</label>
        <select class="btn-secondary" style="padding:8px;">
          <option>USD ($)</option>
          <option>EUR (€)</option>
          <option>GBP (£)</option>
          <option>CAD ($)</option>
        </select>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Language</label>
        <select class="btn-secondary" style="padding:8px;">
          <option>English</option>
          <option>Spanish</option>
          <option>French</option>
        </select>
      </div>

    </section>

    <!-- ACCOUNT MANAGEMENT -->
    <section class="panel">
      <h2>Account Management</h2>

      <div class="form-group">
        <label>Change Password</label>
        <button class="btn-secondary" onclick="showToast('Password reset link sent', 'info')">Send Reset Link</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Delete Account</label>
        <button class="btn-secondary" onclick="showToast('Account deletion requested', 'error')">Request Deletion</button>
      </div>
    </section>

  </main>

  <script src="dashboard.js"></script>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      showToast("Dark mode toggled", "info");
    }
  </script>
<script>
  const path = window.location.pathname;
  document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
    if (path.includes(item.getAttribute('href'))) {
      item.classList.add('active');
    }
  });
</script>
</body>
</html>
