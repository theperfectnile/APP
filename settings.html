<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Settings</title>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="/APP/dashboard.html">Dashboard</a>
      <a href="/APP/insights.html">Insights</a>
      <a href="/APP/accounts.html">Accounts</a>
      <a href="/APP/settings.html" class="active">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <header class="page-header">
      <h1>Settings</h1>
      <span>Customize your Vaultwise experience</span>
    </header>

    <section class="panel">
      <h2>Preferences</h2>

      <div class="form-group">
        <label>Dark Mode</label>
        <button class="btn-secondary">Toggle</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Notifications</label>
        <button class="btn-secondary">Enable</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Data Sync</label>
        <button class="btn-secondary">Sync Now</button>
      </div>

    </section>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
