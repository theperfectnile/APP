<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Settings</title>
  <link rel="stylesheet" href="styles.css?v=10" />
</head>

<body id="settings" class="mood-neutral">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>

    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="reports.html">Reports</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html" class="active">Settings</a>
    </nav>

    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <!-- Main Content -->
  <main class="main-content fade-in">
    <header class="page-header">
      <h1>Settings</h1>
      <span>Customize your Vaultwise experience</span>
    </header>

    <!-- GENERAL SETTINGS -->
    <section class="dashboard-card fade-in">
      <h2>General Settings</h2>
      <p class="section-subtitle">Personalize how Vaultwise looks and behaves.</p>

      <div class="form-group">
        <label>Dark Mode</label>
        <button class="btn-secondary" onclick="toggleDarkMode()">Toggle</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Notifications</label>
        <button class="btn-secondary" onclick="alert('Notifications enabled')">Enable</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Data Sync</label>
        <button class="btn-secondary" onclick="alert('Sync complete')">Sync Now</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Currency Format</label>
        <select class="btn-secondary" style="padding:8px;">
          <option>USD ($)</option>
          <option>EUR (€)</option>
          <option>GBP (£)</option>
          <option>CAD ($)</option>
        </select>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Language</label>
        <select class="btn-secondary" style="padding:8px;">
          <option>English</option>
          <option>Spanish</option>
          <option>French</option>
        </select>
      </div>
    </section>

    <!-- ACCOUNT MANAGEMENT -->
    <section class="dashboard-card fade-in">
      <h2>Account Management</h2>
      <p class="section-subtitle">Security and account preferences.</p>

      <div class="form-group">
        <label>Change Password</label>
        <button class="btn-secondary" onclick="alert('Password reset link sent')">
          Send Reset Link
        </button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Delete Account</label>
        <button class="btn-secondary" onclick="alert('Account deletion requested')">
          Request Deletion
        </button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      alert("Dark mode toggled");
    }
  </script>
</body>
</html>
