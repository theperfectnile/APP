<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Settings</title>
  <link rel="stylesheet" href="styles.css?v=10" />
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="insights.html">Insights</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html" class="active">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <!-- Single video kept here only -->
    <section class="panel">
      <h2>How to Use Vaultwise</h2>
      <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;">
        <iframe
          src="https://www.youtube.com/embed/8Z8ZQ5x6QnE"
          frameborder="0"
          allowfullscreen
          style="position:absolute;top:0;left:0;width:100%;height:100%;">
        </iframe>
      </div>
    </section>

    <header class="page-header">
      <h1>Settings</h1>
      <span>Customize your Vaultwise experience</span>
    </header>

    <section class="panel">
      <h2>Preferences</h2>

      <div class="form-group">
        <label>Dark Mode</label>
        <button class="btn-secondary" onclick="toggleDarkMode()">Toggle</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Notifications</label>
        <button class="btn-secondary" onclick="showToast('Notifications enabled', 'success')">Enable</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Data Sync</label>
        <button class="btn-secondary" onclick="showToast('Sync complete', 'info')">Sync Now</button>
      </div>

    </section>

  </main>

  <script src="dashboard.js"></script>
  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      showToast("Dark mode toggled", "info");
    }
  </script>
</body>
</html>
