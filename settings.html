<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Settings</title>
  <link rel="stylesheet" href="styles.css?v=10" />
</head>

<body id="dashboard">

  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>
    <nav class="nav-links">
      <a href="/APP/dashboard.html">Dashboard</a>
      <a href="/APP/insights.html">Insights</a>
      <a href="/APP/accounts.html">Accounts</a>
      <a href="/APP/settings.html" class="active">Settings</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <main class="main-content fade-in">

    <header class="page-header">
      <h1>Settings</h1>
      <span>Customize your Vaultwise experience</span>
    </header>

    <section class="panel">
      <h2>Preferences</h2>

      <div class="form-group">
        <label>Dark Mode</label>
        <button class="btn-secondary" onclick="toggleDarkMode()">Toggle</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Notifications</label>
        <button class="btn-secondary" onclick="showToast('Notifications enabled', 'success')">Enable</button>
      </div>

      <div class="form-group" style="margin-top:15px;">
        <label>Data Sync</label>
        <button class="btn-secondary" onclick="showToast('Sync complete', 'info')">Sync Now</button>
      </div>

    </section>

  </main>

  <script src="dashboard.js"></script>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      showToast("Dark mode toggled", "info");
    }
  </script>

</body>
</html>
