<!DOCTYPE html>
<html lang="en" id="dashboard">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vaultwise • Dashboard</title>

<style>
  body {
    margin: 0;
    background: radial-gradient(circle at top, #0a0f1f, #000);
    font-family: "Inter", sans-serif;
    color: #fff;
  }

  header {
    padding: 25px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,255,255,0.2);
  }

  .logo {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, #00eaff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logout-btn {
    padding: 10px 20px;
    background: linear-gradient(90deg, #00eaff, #7b2ff7);
    border-radius: 10px;
    border: none;
    cursor: pointer;
    color: #000;
    font-weight: bold;
  }

  .container {
    padding: 50px;
  }

  .card {
    background: rgba(20,20,40,0.6);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 20px rgba(0,255,255,0.1);
    max-width: 500px;
  }

  .card h2 {
    margin-bottom: 20px;
    background: linear-gradient(90deg, #00eaff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .info {
    margin-bottom: 12px;
    font-size: 18px;
  }
</style>
</head>

<body>
<header>
  <div class="logo">Vaultwise</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">
  <div class="card">
    <h2>Your Account</h2>

    <div class="info">Email: <span id="user-email"></span></div>
    <div class="info">Plan: <span id="user-plan"></span></div>
    <div class="info">Trial Started: <span id="trial-start"></span></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
