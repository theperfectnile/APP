<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vaultwise Dashboard</title>

<!-- Chart.js (Edge‑safe version) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d0f17;
        color: white;
        display: flex;
    }

    /* Sidebar */
    .sidebar {
        width: 240px;
        background: #11131c;
        height: 100vh;
        padding: 20px;
        box-sizing: border-box;
        border-right: 1px solid #222;
    }

    .sidebar h2 {
        margin-top: 0;
        color: #6ab0ff;
        text-align: center;
    }

    .nav-item {
        padding: 12px;
        margin: 10px 0;
        background: #1a1d29;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .nav-item:hover {
        background: #232738;
    }

    /* Main content */
    .content {
        flex: 1;
        padding: 30px;
    }

    .section {
        display: none;
    }

    .active {
        display: block;
    }

    .card {
        background: #1a1d29;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    input, select, button {
        padding: 10px;
        margin: 8px 0;
        width: 100%;
        border-radius: 6px;
        border: none;
    }

    button {
        background: #6ab0ff;
        color: black;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #8bc3ff;
    }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Vaultwise</h2>
    <div class="nav-item" onclick="showSection('profile')">Profile</div>
    <div class="nav-item" onclick="showSection('budget')">Budget Analyzer</div>
    <div class="nav-item" onclick="showSection('portfolio')">Portfolio Analyzer</div>
    <div class="nav-item" onclick="showSection('insights')">AI Insights</div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- PROFILE -->
    <div id="profile" class="section active">
        <h2>Your Profile</h2>
        <div class="card">
            <p><strong>Email:</strong> <span id="p-email">Loading...</span></p>
            <p><strong>Plan:</strong> <span id="p-plan">Loading...</span></p>
            <p><strong>Trial Start:</strong> <span id="p-trial">Loading...</span></p>
        </div>
    </div>

    <!-- BUDGET -->
    <div id="budget" class="section">
        <h2>Budget Analyzer</h2>
        <div class="card">
            <input type="number" id="income" placeholder="Monthly Income" />
            <textarea id="expenses" placeholder='Expenses (JSON format):
[
  {"category":"Rent","amount":1200},
  {"category":"Food","amount":300}
]'></textarea>
            <button onclick="runBudget()">Analyze Budget</button>
        </div>
        <div class="card">
            <canvas id="budgetChart"></canvas>
        </div>
        <div class="card">
            <h3>Insights</h3>
            <ul id="budgetInsights"></ul>
        </div>
    </div>

    <!-- PORTFOLIO -->
    <div id="portfolio" class="section">
        <h2>Portfolio Analyzer</h2>
        <div class="card">
            <textarea id="portfolioInput" placeholder='Portfolio (JSON format):
[
  {"name":"AAPL","value":5000,"sector":"Tech","region":"USA"},
  {"name":"TSLA","value":3000,"sector":"Auto","region":"USA"}
]'></textarea>
            <button onclick="runPortfolio()">Analyze Portfolio</button>
        </div>
        <div class="card">
            <canvas id="sectorChart"></canvas>
        </div>
        <div class="card">
            <canvas id="regionChart"></canvas>
        </div>
        <div class="card">
            <h3>Insights</h3>
            <ul id="portfolioInsights"></ul>
        </div>
    </div>

    <!-- INSIGHTS -->
    <div id="insights" class="section">
        <h2>AI Insights</h2>
        <div class="card">
            <p>Coming soon...</p>
        </div>
    </div>

</div>

<script>
/* ------------------ CONFIG ------------------ */
const API_BASE = "https://portfolio-god-99rv.onrender.com";
const API_KEY = "vaultwise123"; // replace with your real key
const token = localStorage.getItem("token");

/* ------------------ NAVIGATION ------------------ */
function showSection(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ------------------ LOAD PROFILE ------------------ */
async function loadProfile() {
    try {
        const res = await fetch(API_BASE + "/api/profile", {
            headers: {
                "Authorization": "Bearer " + token,
                "x-api-key": API_KEY
            }
        });

        const data = await res.json();

        document.getElementById("p-email").textContent = data.email;
        document.getElementById("p-plan").textContent = data.plan;
        document.getElementById("p-trial").textContent = data.trialStart || "None";

    } catch (err) {
        console.error("Profile error:", err);
    }
}

/* ------------------ BUDGET ANALYZER ------------------ */
async function runBudget() {
    try {
        const income = Number(document.getElementById("income").value);
        const expenses = JSON.parse(document.getElementById("expenses").value);

        const res = await fetch(API_BASE + "/api/budget", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token,
                "x-api-key": API_KEY
            },
            body: JSON.stringify({ income, expenses })
        });

        const data = await res.json();

        // Chart
        new Chart(document.getElementById("budgetChart"), {
            type: "pie",
            data: {
                labels: data.categories.map(c => c.category),
                datasets: [{
                    data: data.categories.map(c => c.percent),
                    backgroundColor: ["#6ab0ff", "#8bc3ff", "#4f8cff", "#3a6fd9"]
                }]
            }
        });

        // Insights
        const list = document.getElementById("budgetInsights");
        list.innerHTML = "";
        data.insights.forEach(i => {
            const li = document.createElement("li");
            li.textContent = i;
            list.appendChild(li);
        });

    } catch (err) {
        console.error("Budget error:", err);
    }
}

/* ------------------ PORTFOLIO ANALYZER ------------------ */
async function runPortfolio() {
    try {
        const portfolio = JSON.parse(document.getElementById("portfolioInput").value);

        const res = await fetch(API_BASE + "/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token,
                "x-api-key": API_KEY
            },
            body: JSON.stringify({ portfolio })
        });

        const data = await res.json();

        // Sector chart
        new Chart(document.getElementById("sectorChart"), {
            type: "bar",
            data: {
                labels: data.sectors.map(s => s.sector),
                datasets: [{
                    label: "Sector %",
                    data: data.sectors.map(s => s.percent),
                    backgroundColor: "#6ab0ff"
                }]
            }
        });

        // Region chart
        new Chart(document.getElementById("regionChart"), {
            type: "bar",
            data: {
                labels: data.regions.map(r => r.region),
                datasets: [{
                    label: "Region %",
                    data: data.regions.map(r => r.percent),
                    backgroundColor: "#8bc3ff"
                }]
            }
        });

        // Insights
        const list = document.getElementById("portfolioInsights");
        list.innerHTML = "";
        data.insights.forEach(i => {
            const li = document.createElement("li");
            li.textContent = i;
            list.appendChild(li);
        });

    } catch (err) {
        console.error("Portfolio error:", err);
    }
}

/* ------------------ INIT ------------------ */
loadProfile();
</script>

</body>
</html>
