<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultwise Dashboard</title>

    <!-- Futuristic Cyberpunk Blue Theme -->
    <style>
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: radial-gradient(circle at top, #0a0f1f, #02040a 60%);
            color: #d9e6ff;
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 260px;
            background: rgba(5, 10, 25, 0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0, 140, 255, 0.3);
            padding: 25px;
            height: 100vh;
            position: fixed;
            box-shadow: 0 0 25px rgba(0, 140, 255, 0.2);
        }

        #sidebar h2 {
            font-size: 24px;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #00aaff, #00eaff);
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: rgba(0, 40, 80, 0.4);
            border: 1px solid rgba(0, 140, 255, 0.4);
            border-radius: 10px;
            color: #d9e6ff;
            cursor: pointer;
            transition: 0.25s;
            font-size: 15px;
        }

        .nav-btn:hover {
            background: rgba(0, 140, 255, 0.7);
            box-shadow: 0 0 12px rgba(0, 140, 255, 0.8);
        }

        /* Main Content */
        #main {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .section {
            display: none;
            animation: fadeIn 0.45s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 30px;
            margin-bottom: 20px;
            color: #e8f1ff;
            text-shadow: 0 0 10px rgba(0, 140, 255, 0.6);
        }

        .card {
            background: rgba(10, 20, 40, 0.6);
            border: 1px solid rgba(0, 140, 255, 0.3);
            padding: 25px;
            border-radius: 14px;
            margin-bottom: 25px;
            box-shadow: 0 0 18px rgba(0, 140, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .input-field {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: rgba(0, 20, 40, 0.7);
            border: 1px solid rgba(0, 140, 255, 0.4);
            border-radius: 10px;
            color: #d9e6ff;
            font-size: 15px;
        }

        .input-field:focus {
            outline: none;
            border-color: #00eaff;
            box-shadow: 0 0 10px rgba(0, 234, 255, 0.6);
        }

        .action-btn {
            margin-top: 18px;
            padding: 14px 20px;
            background: linear-gradient(90deg, #007bff, #00eaff);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 15px;
            transition: 0.25s;
        }

        .action-btn:hover {
            box-shadow: 0 0 15px rgba(0, 234, 255, 0.8);
            transform: translateY(-2px);
        }

        .chart-container {
            width: 100%;
            height: 330px;
        }
    </style>

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <h2>VAULTWISE</h2>
        <button class="nav-btn" onclick="showSection('profileSection')">Profile</button>
        <button class="nav-btn" onclick="showSection('budgetSection')">Budget Analyzer</button>
        <button class="nav-btn" onclick="showSection('portfolioSection')">Portfolio Analyzer</button>
        <button class="nav-btn" onclick="showSection('insightsSection')">AI Insights</button>
    </div>

    <!-- Main Content -->
    <div id="main">

        <!-- Profile Section -->
        <div id="profileSection" class="section">
            <h1>Profile</h1>
            <div class="card">
                <p><strong>Name:</strong> <span id="profileName">Loading...</span></p>
                <p><strong>Email:</strong> <span id="profileEmail">Loading...</span></p>
                <p><strong>Account Created:</strong> <span id="profileCreated">Loading...</span></p>
                <p><strong>Last Login:</strong> <span id="profileLastLogin">Loading...</span></p>
            </div>
        </div>

        <!-- Budget Analyzer -->
        <div id="budgetSection" class="section">
            <h1>Budget Analyzer</h1>

            <div class="card">
                <label>Monthly Income</label>
                <input id="budgetIncome" class="input-field" type="number">

                <label>Monthly Expenses</label>
                <input id="budgetExpensesOut" class="input-field" type="number">

                <button class="action-btn" onclick="analyzeBudget()">Analyze</button>
            </div>

            <div class="card">
                <p><strong>Savings:</strong> <span id="budgetSavingsOut">$0</span></p>
                <p><strong>Savings Rate:</strong> <span id="budgetRateOut">0%</span></p>
                <p><strong>Categories:</strong></p>
                <div id="budgetCategories"></div>
                <p><strong>Insights:</strong></p>
                <div id="budgetInsights"></div>
            </div>

            <div class="card chart-container">
                <canvas id="budgetChart"></canvas>
            </div>
        </div>

        <!-- Portfolio Analyzer -->
        <div id="portfolioSection" class="section">
            <h1>Portfolio Analyzer</h1>

            <div class="card">
                <label>Enter Portfolio JSON</label>
                <textarea id="portfolioInput" class="input-field" rows="6"></textarea>
                <button class="action-btn" onclick="analyzePortfolio()">Analyze</button>
            </div>

            <div class="card">
                <p><strong>Total Value:</strong> <span id="portfolioResult">$0</span></p>
                <p><strong>Sectors:</strong></p>
                <div id="sectorBreakdown"></div>
                <p><strong>Regions:</strong></p>
                <div id="regionBreakdown"></div>
                <p><strong>Insights:</strong></p>
                <div id="portfolioInsights"></div>
            </div>

            <div class="card chart-container">
                <canvas id="portfolioChart"></canvas>
            </div>
        </div>

        <!-- Insights Section -->
        <div id="insightsSection" class="section">
            <h1>AI Insights</h1>
            <div class="card">
                <p id="insightsOutput">Your insights will appear here.</p>
            </div>
        </div>

    </div>

    <!-- Your JavaScript (unchanged) -->
    <script>
        const API_BASE = "https://portfolio-god-99rv.onrender.com";

        function showSection(id) {
            document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
            document.getElementById(id).style.display = "block";
        }

        showSection("profileSection");

        async function loadProfile() {
            const token = localStorage.getItem("token");
            if (!token) return;

            const res = await fetch(API_BASE + "/api/profile")
                headers: { "Authorization": token }
            });

            const data = await res.json();

            document.getElementById("profileName").textContent = data.name || "N/A";
            document.getElementById("profileEmail").textContent = data.email;
            document.getElementById("profileCreated").textContent = data.createdAt || "N/A";
            document.getElementById("profileLastLogin").textContent = data.lastLogin || "N/A";
        }

        loadProfile();

        async function analyzeBudget() {
            const income = Number(document.getElementById("budgetIncome").value);
            const expenses = Number(document.getElementById("budgetExpensesOut").value);

            const res = await fetch(API_BASE + "/analyze-budget", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ income, expenses })
            });

            const data = await res.json();

            document.getElementById("budgetSavingsOut").textContent = "$" + data.savings;
            document.getElementById("budgetRateOut").textContent = data.savingsRate + "%";
            document.getElementById("budgetCategories").textContent = data.categories.join(", ");
            document.getElementById("budgetInsights").textContent = data.insights;

            new Chart(document.getElementById("budgetChart"), {
                type: "pie",
                data: {
                    labels: ["Income", "Expenses"],
                    datasets: [{
                        data: [income, expenses],
                        backgroundColor: ["#007bff", "#00eaff"]
                    }]
                }
            });
        }

        async function analyzePortfolio() {
            const portfolio = document.getElementById("portfolioInput").value;

            const res = await fetch(API_BASE + "/analyze-portfolio", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: portfolio
            });

            const data = await res.json();

            document.getElementById("portfolioResult").textContent = "$" + data.totalValue;
            document.getElementById("sectorBreakdown").textContent = JSON.stringify(data.sectors);
            document.getElementById("regionBreakdown").textContent = JSON.stringify(data.regions);
            document.getElementById("portfolioInsights").textContent = data.insights;

            new Chart(document.getElementById("portfolioChart"), {
                type: "bar",
                data: {
                    labels: Object.keys(data.sectors),
                    datasets: [{
                        label: "Sector Allocation",
                        data: Object.values(data.sectors),
                        backgroundColor: "#00eaff"
                    }]
                }
            });
        }
    </script>

</body>
</html>
