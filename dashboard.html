<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vaultwise Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --accent: #58a6ff;
    --success: #238636;
    --danger: #f85149;
    --muted: #8b949e;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .layout {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 260px;
    background: #010409;
    border-right: 1px solid var(--border);
    padding: 20px;
  }

  .logo {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .nav-section-title {
    font-size: 12px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 16px 0 8px;
  }

  .nav-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    font-size: 14px;
  }

  .nav-item.active,
  .nav-item:hover {
    background: #161b22;
  }

  .main {
    flex: 1;
    padding: 20px 24px 40px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .top-title {
    font-size: 22px;
    font-weight: 600;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .badge.pro {
    border-color: var(--success);
    color: var(--success);
  }

  .badge.trial {
    border-color: var(--accent);
    color: var(--accent);
  }

  .badge.free {
    border-color: var(--muted);
  }

  .user-email {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .top-actions button {
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #21262d;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    margin-left: 8px;
  }

  .top-actions button.primary {
    background: var(--success);
    border-color: var(--success);
  }

  .grid {
    display: grid;
    grid-template-columns: 2fr 1.5fr;
    gap: 18px;
    margin-top: 10px;
  }

  .panel {
    background: var(--panel);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 16px 18px 18px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 600;
  }

  .panel-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .inputs-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .inputs-row input {
    flex: 1;
    min-width: 120px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #0d1117;
    color: var(--text);
    font-size: 13px;
  }

  .inputs-row button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 13px;
    cursor: pointer;
  }

  .chart-wrap {
    margin-top: 8px;
  }

  canvas {
    width: 100% !important;
    max-height: 260px;
  }

  .insights {
    margin-top: 10px;
    font-size: 13px;
  }

  .insight-pill {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 12px;
    margin: 2px 4px 2px 0;
  }

  .insight-pill.bad {
    background: rgba(248, 81, 73, 0.15);
    color: var(--danger);
  }

  .insight-pill.ok {
    background: rgba(88, 166, 255, 0.15);
    color: var(--accent);
  }

  .insight-pill.good {
    background: rgba(35, 134, 54, 0.15);
    color: var(--success);
  }

  .stat-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
  }

  .stat-card {
    flex: 1;
    min-width: 120px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0d1117;
    font-size: 12px;
  }

  .stat-label {
    color: var(--muted);
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 14px;
    font-weight: 600;
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  @media (max-width: 900px) {
    .layout {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <div class="logo">Vaultwise</div>
      <div class="nav-section-title">Overview</div>
      <div class="nav-item active">Dashboard</div>
      <div class="nav-item" onclick="logout()">Logout</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="top-bar">
      <div>
        <div class="top-title">Dashboard</div>
        <div class="user-email" id="userEmail">Loading profile...</div>
      </div>
      <div class="top-actions">
        <span id="planBadge" class="badge">Plan</span>
        <button onclick="startTrial()">Start Trial</button>
        <button class="primary" onclick="upgrade()">Upgrade to Pro</button>
      </div>
    </div>

    <div class="status-text" id="trialInfo"></div>

    <!-- GRID -->
    <div class="grid">
      <!-- Budget Panel -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Budget Overview</div>
            <div class="panel-sub">Income, expenses, savings & categories</div>
          </div>
        </div>

        <div class="inputs-row">
          <input id="incomeInput" type="number" placeholder="Monthly income (e.g. 5000)">
          <input id="expensesInput" type="text" placeholder="Expenses JSON (e.g. [{&quot;category&quot;:&quot;Rent&quot;,&quot;amount&quot;:1500}])">
          <button onclick="runBudget()">Analyze</button>
        </div>

        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-label">Total Expenses</div>
            <div class="stat-value" id="totalExpenses">$0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Savings</div>
            <div class="stat-value" id="savings">$0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Savings Rate</div>
            <div class="stat-value" id="savingsRate">0%</div>
          </div>
        </div>

        <div class="chart-wrap">
          <canvas id="incomeExpenseChart"></canvas>
        </div>
        <div class="chart-wrap">
          <canvas id="categoryChart"></canvas>
        </div>

        <div class="insights" id="budgetInsights"></div>
      </div>

      <!-- Portfolio Panel -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Portfolio Overview</div>
            <div class="panel-sub">Allocation by sector & region</div>
          </div>
        </div>

        <div class="inputs-row">
          <input id="portfolioInput" type="text" placeholder='Portfolio JSON (e.g. [{"name":"AAPL","value":5000,"sector":"Tech","region":"US"}])'>
          <button onclick="runPortfolio()">Analyze</button>
        </div>

        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-label">Total Value</div>
            <div class="stat-value" id="totalValue">$0</div>
          </div>
        </div>

        <div class="chart-wrap">
          <canvas id="sectorChart"></canvas>
        </div>
        <div class="chart-wrap">
          <canvas id="regionChart"></canvas>
        </div>

        <div class="insights" id="portfolioInsights"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://portfolio-god-99rv.onrender.com";
const API_KEY = "my-super-secret-key-123";

let incomeExpenseChart, categoryChart, sectorChart, regionChart;

function getToken() {
  return localStorage.getItem("token");
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

async function fetchProfile() {
  const token = getToken();
  if (!token) {
    window.location.href = "index.html";
    return;
  }

  try {
    const res = await fetch(API_BASE + "/api/profile", {
      headers: {
        "Authorization": "Bearer " + token,
        "x-api-key": API_KEY
      }
    });
    const data = await res.json();

    if (data.error) {
      document.getElementById("userEmail").textContent = "Error loading profile";
      return;
    }

    document.getElementById("userEmail").textContent = data.email || "Unknown user";

    const badge = document.getElementById("planBadge");
    badge.textContent = data.plan ? data.plan.toUpperCase() : "FREE";
    badge.classList.remove("pro", "trial", "free");

    if (data.plan === "pro") badge.classList.add("pro");
    else if (data.plan === "trial") badge.classList.add("trial");
    else badge.classList.add("free");

    const trialInfo = document.getElementById("trialInfo");
    if (data.plan === "trial" && data.trialStart) {
      const start = new Date(data.trialStart);
      const now = new Date();
      const diffDays = Math.max(0, 7 - (now - start) / (1000 * 60 * 60 * 24));
      trialInfo.textContent = `Trial active – about ${diffDays.toFixed(1)} days remaining.`;
    } else if (data.plan === "pro") {
      trialInfo.textContent = "You are on the Pro plan. Enjoy full access.";
    } else {
      trialInfo.textContent = "You are on the Free plan. Start a trial or upgrade to unlock everything.";
    }
  } catch (e) {
    document.getElementById("userEmail").textContent = "Error loading profile";
  }
}

async function startTrial() {
  const token = getToken();
  if (!token) return;

  const res = await fetch(API_BASE + "/api/start-trial", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token,
      "x-api-key": API_KEY
    }
  });
  const data = await res.json();
  if (data.token) {
    localStorage.setItem("token", data.token);
  }
  alert(data.message || data.error || "Done");
  fetchProfile();
}

async function upgrade() {
  const token = getToken();
  if (!token) return;

  const res = await fetch(API_BASE + "/api/upgrade", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token,
      "x-api-key": API_KEY
    }
  });
  const data = await res.json();
  if (data.token) {
    localStorage.setItem("token", data.token);
  }
  alert(data.message || data.error || "Done");
  fetchProfile();
}

function destroyChart(chart) {
  if (chart) chart.destroy();
}

async function runBudget() {
  const token = getToken();
  if (!token) return;

  const incomeVal = parseFloat(document.getElementById("incomeInput").value || "0");
  const expensesRaw = document.getElementById("expensesInput").value.trim();

  if (!incomeVal || !expensesRaw) {
    alert("Please enter income and expenses JSON.");
    return;
  }

  let expenses;
  try {
    expenses = JSON.parse(expensesRaw);
  } catch {
    alert("Invalid expenses JSON.");
    return;
  }

  const res = await fetch(API_BASE + "/api/budget", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token,
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ income: incomeVal, expenses })
  });

  const data = await res.json();
  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("totalExpenses").textContent = "$" + data.totalExpenses.toFixed(2);
  document.getElementById("savings").textContent = "$" + data.savings.toFixed(2);
  document.getElementById("savingsRate").textContent = data.savingsRate + "%";

  const ctx1 = document.getElementById("incomeExpenseChart").getContext("2d");
  destroyChart(incomeExpenseChart);
  incomeExpenseChart = new Chart(ctx1, {
    type: "bar",
    data: {
      labels: ["Income", "Expenses", "Savings"],
      datasets: [{
        label: "Amount",
        data: [data.income, data.totalExpenses, data.savings],
        backgroundColor: ["#238636", "#f85149", "#58a6ff"]
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#e6edf3" } },
        y: { ticks: { color: "#e6edf3" } }
      }
    }
  });

  const ctx2 = document.getElementById("categoryChart").getContext("2d");
  destroyChart(categoryChart);
  categoryChart = new Chart(ctx2, {
    type: "pie",
    data: {
      labels: data.categories.map(c => c.category),
      datasets: [{
        data: data.categories.map(c => parseFloat(c.percent)),
        backgroundColor: ["#58a6ff", "#238636", "#f85149", "#c9d1d9", "#f2cc60", "#db61a2"]
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "#e6edf3" }
        }
      }
    }
  });

  const insightsDiv = document.getElementById("budgetInsights");
  insightsDiv.innerHTML = "";
  (data.insights || []).forEach(text => {
    const span = document.createElement("span");
    span.className = "insight-pill " + (
      text.includes("overspending") ? "bad" :
      text.includes("low") ? "ok" : "good"
    );
    span.textContent = text;
    insightsDiv.appendChild(span);
  });
}

async function runPortfolio() {
  const token = getToken();
  if (!token) return;

  const raw = document.getElementById("portfolioInput").value.trim();
  if (!raw) {
    alert("Enter portfolio JSON.");
    return;
  }

  let portfolio;
  try {
    portfolio = JSON.parse(raw);
  } catch {
    alert("Invalid portfolio JSON.");
    return;
  }

  const res = await fetch(API_BASE + "/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token,
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ portfolio })
  });

  const data = await res.json();
  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("totalValue").textContent = "$" + data.totalValue.toFixed(2);

  const ctx1 = document.getElementById("sectorChart").getContext("2d");
  destroyChart(sectorChart);
  sectorChart = new Chart(ctx1, {
    type: "pie",
    data: {
      labels: data.sectors.map(s => s.sector),
      datasets: [{
        data: data.sectors.map(s => parseFloat(s.percent)),
        backgroundColor: ["#58a6ff", "#238636", "#f85149", "#c9d1d9", "#f2cc60", "#db61a2"]
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "#e6edf3" }
        }
      }
    }
  });

  const ctx2 = document.getElementById("regionChart").getContext("2d");
  destroyChart(regionChart);
  regionChart = new Chart(ctx2, {
    type: "pie",
    data: {
      labels: data.regions.map(r => r.region),
      datasets: [{
        data: data.regions.map(r => parseFloat(r.percent)),
        backgroundColor: ["#58a6ff", "#238636", "#f85149", "#c9d1d9", "#f2cc60", "#db61a2"]
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "#e6edf3" }
        }
      }
    }
  });

  const insightsDiv = document.getElementById("portfolioInsights");
  insightsDiv.innerHTML = "";
  (data.insights || []).forEach(text => {
    const span = document.createElement("span");
    span.className = "insight-pill " + (
      text.includes("High concentration") ? "bad" : "good"
    );
    span.textContent = text;
    insightsDiv.appendChild(span);
  });
}

fetchProfile();
</script>
</body>
</html>
