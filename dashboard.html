<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>

<body id="dashboard">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">Vaultwise</h2>

    <nav class="nav-links">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="insights.html">Insights</a>
      <a href="accounts.html">Accounts</a>
      <a href="settings.html">Settings</a>
    </nav>

    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Hero Panel with Black lifestyle photo -->
    <section class="panel">
      <img
        src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1400&q=80"
        alt="Black man reviewing finances at home"
        style="width:100%;border-radius:12px;object-fit:cover;max-height:260px;"
      />
    </section>

    <!-- Header -->
    <header class="page-header">
      <div>
        <h1>Dashboard</h1>
        <span>Your financial overview at a glance</span>
      </div>
    </header>

    <!-- Stats -->
    <section class="stats-grid">
      <div class="stat-card">
        <h3>Monthly Income</h3>
        <p id="income">$0</p>
      </div>

      <div class="stat-card">
        <h3>Monthly Expenses</h3>
        <p id="expenses">$0</p>
      </div>

      <div class="stat-card">
        <h3>Net Savings</h3>
        <p id="savings">$0</p>
      </div>

      <div class="stat-card">
        <h3>Portfolio Value</h3>
        <p id="portfolio">$0</p>
      </div>
    </section>

    <!-- Entry Form -->
    <section class="panel">
      <h2>Add / Update Monthly Entry</h2>

      <div class="form-grid">

        <div class="form-group">
          <label for="month">Month</label>
          <select id="month">
            <option>January</option>
            <option>February</option>
            <option>March</option>
            <option>April</option>
            <option>May</option>
            <option>June</option>
            <option>July</option>
            <option>August</option>
            <option>September</option>
            <option>October</option>
            <option>November</option>
            <option>December</option>
          </select>
        </div>

        <div class="form-group">
          <label for="year">Year</label>
          <input type="number" id="year" value="2026" />
        </div>

        <div class="form-group">
          <label for="monthlyIncome">Monthly Income</label>
          <input type="number" id="monthlyIncome" placeholder="0" />
        </div>

        <div class="form-group">
          <label for="monthlyExpenses">Monthly Expenses</label>
          <input type="number" id="monthlyExpenses" placeholder="0" />
        </div>

        <div class="form-group">
          <label for="portfolioValue">Portfolio Value</label>
          <input type="number" id="portfolioValue" placeholder="0" />
        </div>

        <div class="form-group">
          <label for="savingsGoal">Savings Goal</label>
          <input type="number" id="savingsGoal" placeholder="0" />
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="saveEntry()">Save Entry</button>
        <button class="btn-secondary" onclick="analyzeInsights()">Analyze Insights</button>
      </div>
    </section>

    <!-- Charts -->
    <section class="panel">
      <h2>Financial Charts</h2>
      <canvas id="incomeExpenseChart" height="120"></canvas>
      <canvas id="savingsChart" height="120" style="margin-top: 30px;"></canvas>
    </section>

    <!-- History -->
    <section class="panel">
      <h2>History</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Month</th>
              <th>Income</th>
              <th>Expenses</th>
              <th>Portfolio</th>
              <th>Goal</th>
            </tr>
          </thead>

          <tbody id="history-body"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="dashboard.js"></script>

</body>
</html>
