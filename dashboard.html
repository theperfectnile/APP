<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body id="dashboard">

  <div class="sidebar">
    <h2 class="logo">Vaultwise</h2>

    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="#">Insights</a>
    <a href="#">Accounts</a>
    <a href="#">Settings</a>

    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>

  <div class="main-content">
    <div class="page-header">
      <div>
        <h1>Dashboard</h1>
        <span>Your financial overview at a glance</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Monthly Income</h3>
        <p id="income">$0</p>
      </div>

      <div class="stat-card">
        <h3>Monthly Expenses</h3>
        <p id="expenses">$0</p>
      </div>

      <div class="stat-card">
        <h3>Net Savings</h3>
        <p id="savings">$0</p>
      </div>

      <div class="stat-card">
        <h3>Portfolio Value</h3>
        <p id="portfolio">$0</p>
      </div>
    </div>

    <!-- Entry form -->
    <div class="panel">
      <h2>Add / Update Monthly Entry</h2>

      <div class="form-grid">
        <div class="form-group">
          <label for="month">Month</label>
          <select id="month">
            <option value="January">January</option>
            <option value="February">February</option>
            <option value="March">March</option>
            <option value="April">April</option>
            <option value="May">May</option>
            <option value="June">June</option>
            <option value="July">July</option>
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>
          </select>
        </div>

        <div class="form-group">
          <label for="year">Year</label>
          <input type="number" id="year" value="2026" />
        </div>

        <div class="form-group">
          <label for="monthlyIncome">Monthly Income</label>
          <input type="number" id="monthlyIncome" placeholder="0" />
        </div>

        <div class="form-group">
          <label for="monthlyExpenses">Monthly Expenses</label>
          <input type="number" id="monthlyExpenses" placeholder="0" />
        </div>

        <div class="form-group">
          <label for="portfolioValue">Portfolio Value</label>
          <input type="number" id="portfolioValue" placeholder="0" />
        </div>

        <div class="form-group">
          <label for="savingsGoal">Savings Goal</label>
          <input type="number" id="savingsGoal" placeholder="0" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="saveEntry()">Save Entry</button>
        <button class="btn-secondary" onclick="analyzeInsights()">Analyze Insights</button>
      </div>
    </div>

    <!-- Charts -->
    <div class="panel">
      <h2>Financial Charts</h2>
      <canvas id="incomeExpenseChart" height="120"></canvas>
      <canvas id="savingsChart" height="120" style="margin-top: 30px;"></canvas>
    </div>

    <!-- History -->
    <div class="panel">
      <h2>History</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Month</th>
              <th>Income</th>
              <th>Expenses</th>
              <th>Portfolio</th>
              <th>Goal</th>
            </tr>
          </thead>
          <tbody id="history-body">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
