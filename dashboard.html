<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vaultwise • Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dash-body">
  <div class="dash-layout">
    <aside class="dash-sidebar">
      <div class="brand">Vaultwise</div>
      <nav>
        <button class="nav-item active">Overview</button>
        <button class="nav-item">Accounts</button>
        <button class="nav-item">Insights</button>
      </nav>
      <button id="logoutBtn" class="btn ghost small">Logout</button>
    </aside>

    <main class="dash-main">
      <header class="dash-header">
        <div>
          <h1>Portfolio overview</h1>
          <p class="subtitle">High-level snapshot of your finances</p>
        </div>
        <div class="pill">Secure • Encrypted • Private</div>
      </header>

      <section class="dash-grid">
        <div class="card metric">
          <h3>Total balance</h3>
          <p class="metric-value" id="totalBalance">$124,580.23</p>
          <span class="metric-tag positive">+4.2% this month</span>
        </div>

        <div class="card metric">
          <h3>Active accounts</h3>
          <p class="metric-value" id="activeAccounts">7</p>
          <span class="metric-tag neutral">Multi‑institution</span>
        </div>

        <div class="card metric">
          <h3>Risk score</h3>
          <p class="metric-value" id="riskScore">Moderate</p>
          <span class="metric-tag warning">Diversify suggested</span>
        </div>
      </section>

      <section class="card wide">
        <div class="card-header">
          <h3>Recent activity</h3>
          <span class="chip">Sample data</span>
        </div>
        <div class="activity-list" id="activityList">
          <!-- Filled by JS -->
        </div>
      </section>
    </main>
  </div>

  <script>loadDashboard()</script>
<span id="user-email"></span>
<span id="user-plan"></span>
<span id="trial-start"></span>
<button onclick="logout()">Logout</button>
</body>
</html>
