<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vaultwise • Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
 <div class="sidebar">
  <h2 class="logo">Vaultwise</h2>

  <a href="dashboard.html" class="active">Dashboard</a>
  <a href="insights.html">Insights</a>
  <a href="accounts.html">Accounts</a>
  <a href="settings.html">Settings</a>

  <button class="logout-btn" onclick="logout()">Sign Out</button>
</div>

<div class="main-content">


  <main class="dashboard">
    <section class="cards">
      <div class="card">
        <h2>Monthly Income</h2>
        <p id="incomeValue">$0</p>
      </div>
      <div class="card">
        <h2>Monthly Expenses</h2>
        <p id="expensesValue">$0</p>
      </div>
      <div class="card">
        <h2>Net Savings</h2>
        <p id="savingsValue">$0</p>
      </div>
      <div class="card">
        <h2>Portfolio Value</h2>
        <p id="portfolioValue">$0</p>
      </div>
    </section>

    <section class="user-input-section">
      <h2>Enter Your Financial Data</h2>

      <div class="row">
        <label>Month</label>
        <select id="monthSelect"></select>
        <label>Year</label>
        <select id="yearSelect"></select>
      </div>

      <div class="row">
        <input id="incomeInput" type="number" placeholder="Monthly Income" />
        <input id="expensesInput" type="number" placeholder="Monthly Expenses" />
      </div>

      <div class="row">
        <input id="portfolioInput" type="number" placeholder="Portfolio Value" />
        <input id="goalInput" type="number" placeholder="Savings Goal" />
      </div>

      <div class="row">
        <button id="saveEntryBtn">Save Entry</button>
        <button id="analyzeBtn">Analyze</button>
      </div>
    </section>

    <section class="insights-section">
      <h2>Insights</h2>
      <p id="insightsText">Add data and click Analyze to see insights.</p>
    </section>

    <section class="history-section">
      <h2>History</h2>
      <table>
        <thead>
          <tr>
            <th>Month</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Portfolio</th>
            <th>Goal</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
