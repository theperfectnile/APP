<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set new password – Vaultwise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg: #050816;
        --accent: #7c3aed;
        --accent2: #22d3ee;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --danger: #f97373;
        --success: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #1d1b3f 0, #050816 40%, #020617 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .shell {
        width: 100%;
        max-width: 380px;
        background: radial-gradient(circle at top, rgba(124, 58, 237, 0.18), transparent 55%),
                    #020617;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        padding: 26px 24px 22px;
        box-shadow: 0 0 40px rgba(15, 23, 42, 0.9);
        position: relative;
        overflow: hidden;
    }
    .shell-inner { position: relative; z-index: 1; }
    .logo-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
    }
    .logo-badge {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: conic-gradient(from 180deg, #22d3ee, #7c3aed, #22c55e, #22d3ee);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        color: #020617;
        font-weight: 800;
    }
    .logo-text {
        font-weight: 600;
        letter-spacing: 0.08em;
        font-size: 0.9rem;
        text-transform: uppercase;
        color: var(--muted);
    }
    h2 {
        margin-top: 6px;
        font-size: 1.4rem;
        margin-bottom: 4px;
    }
    .subtitle {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 18px;
    }
    label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 4px;
        color: var(--muted);
    }
    input {
        width: 100%;
        padding: 9px 10px;
        border-radius: 10px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        background: #020617;
        color: var(--text);
        font-size: 0.9rem;
        margin-bottom: 10px;
        outline: none;
        transition: 0.15s;
    }
    input:focus {
        border-color: var(--accent2);
        box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.4);
    }
    button {
        width: 100%;
        padding: 9px 10px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #020617;
        box-shadow: 0 0 25px rgba(124, 58, 237, 0.5);
        margin-top: 4px;
        transition: 0.15s;
    }
    button:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
    }
    .msg {
        margin-top: 10px;
        font-size: 0.8rem;
        min-height: 16px;
    }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--success); }
    .foot {
        margin-top: 14px;
        font-size: 0.8rem;
        color: var(--muted);
        text-align: center;
    }
    .foot a {
        color: var(--accent2);
        text-decoration: none;
    }
    .foot a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="shell">
    <div class="shell-inner">
        <div class="logo-row">
            <div class="logo-badge">V</div>
            <div class="logo-text">Vaultwise</div>
        </div>
        <h2>Set a new password</h2>
        <div class="subtitle">
            Choose a strong password to secure your Vaultwise account.
        </div>

        <label for="password">New password</label>
        <input id="password" type="password" placeholder="At least 8 characters">

        <button onclick="setNewPassword()">Update password</button>

        <div id="msgBox" class="msg"></div>

        <div class="foot">
            Done here?
            <a href="login.html">Back to login</a>
        </div>
    </div>
</div>

<script>
const API_BASE = "https://portfolio-god-99rv.onrender.com";
const API_KEY = "my-super-secret-key-123";

function getTokenFromQuery() {
    const params = new URLSearchParams(window.location.search);
    return params.get("token");
}

async function setNewPassword() {
    const password = document.getElementById("password").value.trim();
    const msgBox = document.getElementById("msgBox");
    msgBox.textContent = "";
    msgBox.className = "msg";

    const token = getTokenFromQuery();
    if (!token) {
        msgBox.textContent = "Reset link is invalid or missing.";
        msgBox.classList.add("error");
        return;
    }

    if (!password || password.length < 8) {
        msgBox.textContent = "Password must be at least 8 characters.";
        msgBox.classList.add("error");
        return;
    }

    try {
        const res = await fetch(API_BASE + "/api/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": API_KEY
            },
            body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (!res.ok) {
            msgBox.textContent = data.error || "Could not reset password.";
            msgBox.classList.add("error");
            return;
        }

        msgBox.textContent = "Password updated. You can now log in.";
        msgBox.classList.add("success");
    } catch (err) {
        msgBox.textContent = "Network error. Please try again.";
        msgBox.classList.add("error");
    }
}
</script>

</body>
</html>
